<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Smart Piggy Bank Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

  <div class="dashboard-container">

    <div class="top-section">
      <h1>🐷 Smart Piggy Bank</h1>

      <p class="goal-text">
        You are saving for:
      </p>

      <h2 id="showGoal">Laptop</h2>
    </div>

    <!-- Cards -->

    <div class="card">
      <h3>🎯 Target Amount</h3>
      <p id="showAmount">₹0</p>
    </div>

    <div class="card">
  <h3>💰 Current Savings</h3>

  <p id="savedMoney">
    ₹0
  </p>
</div>

<div class="card">

  <h3>🏦 Remaining Amount</h3>

  <p id="remainingAmount">
    ₹0
  </p>

</div>

<div class="card">

  <h3>🧾 Transaction History</h3>

  <ul id="historyList">

  </ul>

</div>
<div class="card">

  <h3>📈 Saving Progress</h3>

  <div class="progress-bar">

    <div
      class="progress-fill"
      id="progressFill">

    </div>

  </div>

  <p id="progressText">
    0% Completed
  </p>

</div>

    <div class="card">
      <h3>📅 Deadline</h3>
      <p id="showDate">No Date</p>
    </div>

    <div class="card">
      <h3>💚 Motivation</h3>
      <p id="showReason">
        Your reason will appear here
      </p>
    </div>

   <div class="money-box">

  <input
    type="number"
    id="moneyInput"
    placeholder="Enter amount">

  <button
    class="money-btn"
    onclick="addMoney()">

    ➕ Add Money

  </button>

</div>

  </div>

  <script src="dashboard.js"></script>

</body>
</html>
