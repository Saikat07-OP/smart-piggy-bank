<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>Smart Piggy Bank</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="background-circle"></div>
  <div class="background-circle2"></div>

  <div class="login-container">

    <div class="logo">🐷</div>

    <h2>Smart Piggy Bank</h2>

    <p class="subtitle">
      Save money smartly for your student goals 💰
    </p>

    <div class="input-box">
      <label>Name</label>
      <input type="text" placeholder="Enter your name">
    </div>

    <div class="input-box">
      <label>Email</label>
      <input type="email" placeholder="Enter your email">
    </div>

    <div class="input-box">
      <label>Password</label>
      <input type="password" placeholder="Enter password">
    </div>

<button class="login-btn" onclick="goToVault()">
  Start Saving 🚀
</button>

<script src="script.js"></script>

    <p class="saving-text">
      Small savings today = <span>Big dreams tomorrow</span>
    </p>

  </div>

</body>
</html>
