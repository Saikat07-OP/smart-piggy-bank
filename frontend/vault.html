<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Set Your Goal</title>

  <link rel="stylesheet" href="goal.css">
</head>
<body>

  <div class="goal-container">

    <div class="top-icon">🎯</div>

    <h1>Create Your Saving Goal</h1>

    <p class="subtitle">
      Start saving for your dream step by step 💚
    </p>

    <!-- Goal Name -->
    <div class="input-box">
      <label>Goal Name</label>
      <input type="text" id="goalName" placeholder="Example: Laptop">
    </div>

    <!-- Target Amount -->
    <div class="input-box">
      <label>Target Amount</label>
      <input type="number" id="goalAmount" placeholder="Example: 50000">
    </div>

    <!-- Deadline -->
    <div class="input-box">
      <label>Deadline</label>
      <input type="date" id="goalDate">
    </div>

    <!-- Motivation -->
    <div class="input-box">
      <label>Why are you saving?</label>

      <textarea id="goalReason"
placeholder="Example: I need a laptop for coding and college projects"></textarea>
    </div>

    <button class="save-btn" onclick="saveGoal()">
  Save Goal 🚀
</button>
    <script src="vault.js"></script>

  </div>

</body>
</html>
